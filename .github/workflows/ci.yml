name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt && pip install -e .
      - name: Run ruff
        run: ruff check src tests

  # ── Type check ────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt && pip install -e .
      - name: Run mypy
        run: mypy src

  # ── Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt && pip install -e .
      - name: Run unit tests
        run: pytest tests/unit --tb=short -q
        timeout-minutes: 5

  # ── Integration / acceptance tests (no external broker required) ──────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt && pip install -e .
      - name: Run integration tests (non-slow, no external broker)
        # Runs all integration tests except those marked slow.
        # test_mqtt_integration.py is excluded (requires Mosquitto broker).
        # Other MQTT-dependent tests (cross-protocol, fnb-opcua-mqtt) have
        # skipif markers and self-skip when no broker is available.
        run: >-
          pytest
          tests/integration/
          --ignore=tests/integration/test_mqtt_integration.py
          -m "not slow"
          --tb=short -q
        timeout-minutes: 10
