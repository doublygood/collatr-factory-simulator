# CollatrEdge Configuration — Factory Simulator (Realistic Multi-Controller Mode)
#
# Connects to the simulator running in realistic mode, where each physical
# controller has its own port. This tests CollatrEdge's ability to maintain
# concurrent connections to multiple controllers from different vendors.
#
# Prerequisites:
#   1. Simulator running in realistic mode:
#      docker compose -f docker-compose.yml -f docker-compose.realistic.yaml up -d
#   2. Health check passes on all per-controller ports
#   3. CollatrEdge binary available
#
# Usage:
#   collatr-edge --config config/examples/collatr-edge-realistic.yaml
#
# This config connects to the PACKAGING PROFILE in realistic mode.
# Per-controller port layout:
#   5020 — Press PLC (Siemens S7-1500): UID 1 (press) + UID 5 (energy meter)
#   5021 — Laminator PLC (Siemens S7-1200): UID 1
#   5022 — Slitter PLC (Siemens S7-1200): UID 1
#   4840 — OPC-UA (full PackagingLine tree, Press PLC dual-stack)
#   1883 — MQTT (coder, environment, vibration)
#
# Key differences vs collapsed mode:
#   - Four separate Modbus connections instead of one
#   - Each connection uses the correct UID for that controller
#   - Out-of-range register reads return exception 0x02 (not zeroes)
#   - Each controller may drop independently (Eurotherm drops more often)
#   - Response latency differs per controller type (S7-1500 ~50ms, typical)
#   - OPC-UA SourceTimestamp may show per-controller clock drift
#
# PRD Reference: Section 3a.2, 3a.3, 3a.4, Appendix A

agent:
  hostname: factory-sim-realistic
  interval: 1s
  round_interval: true
  flush_interval: 5s
  precision: 1ms
  log_level: info

global_tags:
  environment: simulator
  profile: packaging
  network_mode: realistic
  source: factory-simulator

# ==========================================================================
# MODBUS: Port 5020 — Press PLC (Siemens S7-1500)
# UID 1: press signals (HR 100-399)
# UID 5: energy meter (HR 600-603, Schneider PM5560)
# Byte order: ABCD
# PRD: Section 3a.2 (Press PLC), Appendix A
# ==========================================================================

inputs:
  - type: modbus
    alias: press_plc_s7_1500
    controller: tcp://localhost:5020
    slave_id: 1
    byte_order: ABCD
    timeout: 5s
    registers:
      - address: 100
        name: press.line_speed
        type: holding
        data_type: float32
        unit: m/min
      - address: 102
        name: press.web_tension
        type: holding
        data_type: float32
        unit: N
      - address: 110
        name: press.ink_viscosity
        type: holding
        data_type: float32
        unit: seconds
      - address: 112
        name: press.ink_temperature
        type: holding
        data_type: float32
        unit: C
      - address: 120
        name: press.dryer_temp_zone_1
        type: holding
        data_type: float32
        unit: C
      - address: 122
        name: press.dryer_temp_zone_2
        type: holding
        data_type: float32
        unit: C
      - address: 124
        name: press.dryer_temp_zone_3
        type: holding
        data_type: float32
        unit: C
      - address: 140
        name: press.dryer_setpoint_zone_1
        type: holding
        data_type: float32
        unit: C
      - address: 142
        name: press.dryer_setpoint_zone_2
        type: holding
        data_type: float32
        unit: C
      - address: 144
        name: press.dryer_setpoint_zone_3
        type: holding
        data_type: float32
        unit: C
      - address: 200
        name: press.impression_count
        type: holding
        data_type: uint32
      - address: 202
        name: press.good_count
        type: holding
        data_type: uint32
      - address: 204
        name: press.waste_count
        type: holding
        data_type: uint32
      - address: 210
        name: press.machine_state
        type: holding
        data_type: uint16
      - address: 211
        name: press.fault_code
        type: holding
        data_type: uint16
      - address: 300
        name: press.main_drive_current
        type: holding
        data_type: float32
        unit: A
      - address: 302
        name: press.main_drive_speed
        type: holding
        data_type: float32
        unit: RPM
      - address: 310
        name: press.nip_pressure
        type: holding
        data_type: float32
        unit: bar
      - address: 320
        name: press.unwind_diameter
        type: holding
        data_type: float32
        unit: mm
      - address: 322
        name: press.rewind_diameter
        type: holding
        data_type: float32
        unit: mm
      # Input registers: Eurotherm-style int16 x10 (IR 0-3)
      - address: 0
        name: press.dryer_temp_zone_1_ir
        type: input
        data_type: int16
        scale: 0.1
        unit: C
      - address: 1
        name: press.dryer_temp_zone_2_ir
        type: input
        data_type: int16
        scale: 0.1
        unit: C
      - address: 2
        name: press.dryer_temp_zone_3_ir
        type: input
        data_type: int16
        scale: 0.1
        unit: C
      - address: 3
        name: press.ink_temperature_ir
        type: input
        data_type: int16
        scale: 0.1
        unit: C
      # Coils and discrete inputs
      - address: 0
        name: press.running
        type: coil
        data_type: bool
      - address: 1
        name: press.fault_active
        type: coil
        data_type: bool
      - address: 2
        name: press.emergency_stop
        type: coil
        data_type: bool
      - address: 3
        name: press.web_break
        type: coil
        data_type: bool
      - address: 0
        name: press.guard_door_open
        type: discrete
        data_type: bool
      - address: 1
        name: press.material_present
        type: discrete
        data_type: bool

  # Energy meter polls port 5020 with UID 5 (shares physical port with press)
  - type: modbus
    alias: energy_meter_pm5560
    controller: tcp://localhost:5020
    slave_id: 5
    byte_order: ABCD
    timeout: 5s
    registers:
      - address: 600
        name: energy.line_power
        type: holding
        data_type: float32
        unit: kW
      - address: 602
        name: energy.cumulative_kwh
        type: holding
        data_type: float32
        unit: kWh

# ==========================================================================
# MODBUS: Port 5021 — Laminator PLC (Siemens S7-1200)
# UID 1: laminator signals (HR 400-409) + IR 4-5
# Byte order: ABCD
# PRD: Section 3a.2 (Laminator PLC)
# ==========================================================================

  - type: modbus
    alias: laminator_plc_s7_1200
    controller: tcp://localhost:5021
    slave_id: 1
    byte_order: ABCD
    timeout: 5s
    registers:
      - address: 400
        name: laminator.nip_temp
        type: holding
        data_type: float32
        unit: C
      - address: 402
        name: laminator.nip_pressure
        type: holding
        data_type: float32
        unit: bar
      - address: 404
        name: laminator.tunnel_temp
        type: holding
        data_type: float32
        unit: C
      - address: 406
        name: laminator.web_speed
        type: holding
        data_type: float32
        unit: m/min
      - address: 408
        name: laminator.adhesive_weight
        type: holding
        data_type: float32
        unit: g/m2
      - address: 4
        name: laminator.nip_temp_ir
        type: input
        data_type: int16
        scale: 0.1
        unit: C
      - address: 5
        name: laminator.tunnel_temp_ir
        type: input
        data_type: int16
        scale: 0.1
        unit: C
      - address: 4
        name: laminator.running
        type: coil
        data_type: bool

# ==========================================================================
# MODBUS: Port 5022 — Slitter PLC (Siemens S7-1200)
# UID 1: slitter signals (HR 500-511)
# Byte order: ABCD
# PRD: Section 3a.2 (Slitter PLC)
# ==========================================================================

  - type: modbus
    alias: slitter_plc_s7_1200
    controller: tcp://localhost:5022
    slave_id: 1
    byte_order: ABCD
    timeout: 5s
    registers:
      - address: 500
        name: slitter.speed
        type: holding
        data_type: float32
        unit: m/min
      - address: 502
        name: slitter.web_tension
        type: holding
        data_type: float32
        unit: N
      - address: 510
        name: slitter.reel_count
        type: holding
        data_type: uint32
      - address: 5
        name: slitter.running
        type: coil
        data_type: bool

# ==========================================================================
# OPC-UA — Port 4840: Press PLC (full PackagingLine tree)
# Same as collapsed mode — Press S7-1500 is dual-stack.
# PRD: Section 3a.2, Appendix B
# ==========================================================================

  - type: opcua
    alias: press_opcua_4840
    endpoint: opc.tcp://localhost:4840
    security_policy: None
    security_mode: None
    auth_method: anonymous
    connect_timeout: 15s
    request_timeout: 10s
    timestamp: source
    subscription:
      publishing_interval: 1s
      queue_size: 10
    nodes:
      - node_id: "ns=2;s=PackagingLine.Press1.LineSpeed"
        name: press.line_speed
      - node_id: "ns=2;s=PackagingLine.Press1.WebTension"
        name: press.web_tension
      - node_id: "ns=2;s=PackagingLine.Press1.State"
        name: press.machine_state
      - node_id: "ns=2;s=PackagingLine.Press1.FaultCode"
        name: press.fault_code
      - node_id: "ns=2;s=PackagingLine.Press1.Dryer.Zone1.Temperature"
        name: press.dryer_temp_zone_1
      - node_id: "ns=2;s=PackagingLine.Press1.Dryer.Zone2.Temperature"
        name: press.dryer_temp_zone_2
      - node_id: "ns=2;s=PackagingLine.Press1.Dryer.Zone3.Temperature"
        name: press.dryer_temp_zone_3
      - node_id: "ns=2;s=PackagingLine.Press1.MainDrive.Current"
        name: press.main_drive_current
      - node_id: "ns=2;s=PackagingLine.Energy.LinePower"
        name: energy.line_power
      - node_id: "ns=2;s=PackagingLine.Energy.CumulativeKwh"
        name: energy.cumulative_kwh
      - node_id: "ns=2;s=PackagingLine.Laminator1.NipTemperature"
        name: laminator.nip_temp
      - node_id: "ns=2;s=PackagingLine.Slitter1.Speed"
        name: slitter.speed

# ==========================================================================
# MQTT — unchanged from collapsed mode (single MQTT broker)
# PRD: Section 3a.2, Appendix C
# ==========================================================================

  - type: mqtt_consumer
    alias: packaging_mqtt
    servers:
      - tcp://localhost:1883
    topics:
      - collatr/factory/demo/packaging1/coder/#
      - collatr/factory/demo/packaging1/env/#
      - collatr/factory/demo/packaging1/vibration/#
    qos: 1
    data_format: json
    topic_tag: topic
    tags:
      protocol: mqtt
    reconnect:
      initial_delay: 2s
      max_delay: 30s

# ==========================================================================
# Outputs
# ==========================================================================

outputs:
  - type: local_store
    path: ./data/factory-sim-realistic
    retention_days: 7
    rotation: daily

  - type: file
    alias: verification_log
    path: ./data/factory-sim-realistic/metrics.jsonl
    data_format: json
