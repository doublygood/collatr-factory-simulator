# CollatrEdge Configuration — Factory Simulator (F&B Profile)
#
# Connects to the Collatr Factory Simulator and collects all 68 F&B
# signals across Modbus TCP, OPC-UA, and MQTT simultaneously.
#
# Prerequisites:
#   1. Simulator running with F&B config:
#      docker compose up -d -e SIM_CONFIG_PATH=config/factory-foodbev.yaml
#   2. Mosquitto broker healthy: docker compose ps
#   3. CollatrEdge binary available
#
# Usage:
#   collatr-edge --config config/examples/collatr-edge-foodbev.yaml
#
# Protocol endpoints (collapsed mode):
#   Modbus:  localhost:502   (all equipment, mixed byte orders)
#   OPC-UA:  opc.tcp://localhost:4840
#   MQTT:    tcp://localhost:1883
#
# IMPORTANT byte order per equipment:
#   Mixer (CompactLogix): CDAB (Allen-Bradley word-swapped)
#   All other F&B equipment: ABCD (Siemens/Eurotherm convention)
#
# PRD Reference: Section 2b, Appendix A, B, C (F&B sections)

agent:
  hostname: factory-sim-foodbev
  interval: 1s
  round_interval: true
  flush_interval: 5s
  precision: 1ms
  log_level: info

global_tags:
  environment: simulator
  profile: foodbev
  source: factory-simulator

# ==========================================================================
# MODBUS TCP — Mixer
# localhost:502, Unit ID 1, CDAB byte order (Allen-Bradley CompactLogix)
# HR 1000-1011. PRD: Appendix A, Section 2b.2
# ==========================================================================

inputs:
  - type: modbus
    alias: fnb_mixer
    controller: tcp://localhost:502
    slave_id: 1
    byte_order: CDAB
    timeout: 5s
    registers:
      - address: 1000
        name: mixer.speed
        type: holding
        data_type: float32
        unit: RPM
      - address: 1002
        name: mixer.torque
        type: holding
        data_type: float32
        unit: "%"
      - address: 1004
        name: mixer.batch_temp
        type: holding
        data_type: float32
        unit: C
      - address: 1006
        name: mixer.batch_weight
        type: holding
        data_type: float32
        unit: kg
      - address: 1010
        name: mixer.mix_time_elapsed
        type: holding
        data_type: uint32
        unit: s

# ==========================================================================
# MODBUS TCP — Oven (Eurotherm gateway), Filler, Sealer, Chiller, CIP, Energy
# localhost:502, ABCD byte order, multiple Unit IDs
# PRD: Appendix A, Section 2b.3-2b.8
# ==========================================================================

  - type: modbus
    alias: fnb_oven_filler_sealer_chiller_cip_energy
    controller: tcp://localhost:502
    slave_id: 1
    byte_order: ABCD
    timeout: 5s
    registers:
      # --- Oven zones (HR 1100-1157, Eurotherm 3504 gateway, UID 1/2/3) ---
      - address: 1100
        name: oven.zone_1_temp
        type: holding
        data_type: float32
        unit: C
      - address: 1102
        name: oven.zone_2_temp
        type: holding
        data_type: float32
        unit: C
      - address: 1104
        name: oven.zone_3_temp
        type: holding
        data_type: float32
        unit: C
      - address: 1110
        name: oven.zone_1_setpoint
        type: holding
        data_type: float32
        unit: C
      - address: 1112
        name: oven.zone_2_setpoint
        type: holding
        data_type: float32
        unit: C
      - address: 1114
        name: oven.zone_3_setpoint
        type: holding
        data_type: float32
        unit: C
      - address: 1120
        name: oven.belt_speed
        type: holding
        data_type: float32
        unit: m/min
      - address: 1122
        name: oven.exhaust_temp
        type: holding
        data_type: float32
        unit: C
      - address: 1124
        name: oven.humidity
        type: holding
        data_type: float32
        unit: "%RH"
      # --- Filler (HR 1200-1218) ---
      - address: 1200
        name: filler.fill_weight_actual
        type: holding
        data_type: float32
        unit: g
      - address: 1202
        name: filler.fill_weight_setpoint
        type: holding
        data_type: float32
        unit: g
      - address: 1204
        name: filler.fill_rate
        type: holding
        data_type: float32
        unit: packs/min
      - address: 1206
        name: filler.product_temp
        type: holding
        data_type: float32
        unit: C
      - address: 1208
        name: filler.hopper_level
        type: holding
        data_type: float32
        unit: "%"
      - address: 1210
        name: filler.pack_count
        type: holding
        data_type: uint32
      - address: 1214
        name: filler.reject_count
        type: holding
        data_type: uint32
      # --- Sealer (HR 1300-1314) ---
      - address: 1300
        name: sealer.seal_temp_top
        type: holding
        data_type: float32
        unit: C
      - address: 1302
        name: sealer.seal_temp_bottom
        type: holding
        data_type: float32
        unit: C
      - address: 1304
        name: sealer.seal_pressure
        type: holding
        data_type: float32
        unit: bar
      - address: 1306
        name: sealer.dwell_time
        type: holding
        data_type: float32
        unit: ms
      - address: 1310
        name: sealer.pack_count
        type: holding
        data_type: uint32
      - address: 1314
        name: sealer.reject_count
        type: holding
        data_type: uint32
      # --- Chiller room (HR 1400-1418) ---
      - address: 1400
        name: chiller.room_temp
        type: holding
        data_type: float32
        unit: C
      - address: 1402
        name: chiller.room_temp_setpoint
        type: holding
        data_type: float32
        unit: C
      - address: 1404
        name: chiller.compressor_suction_temp
        type: holding
        data_type: float32
        unit: C
      - address: 1406
        name: chiller.compressor_discharge_temp
        type: holding
        data_type: float32
        unit: C
      - address: 1408
        name: chiller.evaporator_temp
        type: holding
        data_type: float32
        unit: C
      # --- CIP (HR 1500-1516) ---
      - address: 1500
        name: cip.flow_rate
        type: holding
        data_type: float32
        unit: L/min
      - address: 1502
        name: cip.temperature
        type: holding
        data_type: float32
        unit: C
      - address: 1504
        name: cip.conductivity
        type: holding
        data_type: float32
        unit: mS/cm
      - address: 1506
        name: cip.pressure
        type: holding
        data_type: float32
        unit: bar
      # --- Energy meters (HR 1600-1607, Schneider PM5560) ---
      - address: 1600
        name: energy.line_power
        type: holding
        data_type: float32
        unit: kW
      - address: 1602
        name: energy.cumulative_kwh
        type: holding
        data_type: float32
        unit: kWh
      - address: 1604
        name: energy.oven_power
        type: holding
        data_type: float32
        unit: kW
      - address: 1606
        name: energy.oven_cumulative_kwh
        type: holding
        data_type: float32
        unit: kWh

# ==========================================================================
# OPC-UA — F&B node tree (FoodBevLine)
# Namespace: urn:collatr:factory-simulator (ns=2)
# PRD: Appendix B, Section 3.2 (F&B nodes)
# ==========================================================================

  - type: opcua
    alias: fnb_opcua
    endpoint: opc.tcp://localhost:4840
    security_policy: None
    security_mode: None
    auth_method: anonymous
    connect_timeout: 15s
    request_timeout: 10s
    timestamp: source
    subscription:
      publishing_interval: 1s
      queue_size: 10
    nodes:
      # Filler
      - node_id: "ns=2;s=FoodBevLine.Filler1.FillWeightActual"
        name: filler.fill_weight_actual
      - node_id: "ns=2;s=FoodBevLine.Filler1.FillWeightSetpoint"
        name: filler.fill_weight_setpoint
      - node_id: "ns=2;s=FoodBevLine.Filler1.FillRate"
        name: filler.fill_rate
      - node_id: "ns=2;s=FoodBevLine.Filler1.ProductTemp"
        name: filler.product_temp
      - node_id: "ns=2;s=FoodBevLine.Filler1.HopperLevel"
        name: filler.hopper_level
      - node_id: "ns=2;s=FoodBevLine.Filler1.PackCount"
        name: filler.pack_count
      - node_id: "ns=2;s=FoodBevLine.Filler1.RejectCount"
        name: filler.reject_count
      # QC / Checkweigher
      - node_id: "ns=2;s=FoodBevLine.QC1.CheckweighMean"
        name: qc.checkweigh_mean
      - node_id: "ns=2;s=FoodBevLine.QC1.CheckweighStddev"
        name: qc.checkweigh_stddev
      - node_id: "ns=2;s=FoodBevLine.QC1.RejectRate"
        name: qc.reject_rate
      - node_id: "ns=2;s=FoodBevLine.QC1.PackCount"
        name: qc.pack_count
      - node_id: "ns=2;s=FoodBevLine.QC1.RejectCount"
        name: qc.reject_count
      - node_id: "ns=2;s=FoodBevLine.QC1.State"
        name: qc.machine_state
      # Oven zones
      - node_id: "ns=2;s=FoodBevLine.Oven1.Zone1.Temperature"
        name: oven.zone_1_temp
      - node_id: "ns=2;s=FoodBevLine.Oven1.Zone1.Setpoint"
        name: oven.zone_1_setpoint
      - node_id: "ns=2;s=FoodBevLine.Oven1.Zone2.Temperature"
        name: oven.zone_2_temp
      - node_id: "ns=2;s=FoodBevLine.Oven1.Zone2.Setpoint"
        name: oven.zone_2_setpoint
      - node_id: "ns=2;s=FoodBevLine.Oven1.Zone3.Temperature"
        name: oven.zone_3_temp
      - node_id: "ns=2;s=FoodBevLine.Oven1.Zone3.Setpoint"
        name: oven.zone_3_setpoint
      - node_id: "ns=2;s=FoodBevLine.Oven1.BeltSpeed"
        name: oven.belt_speed

# ==========================================================================
# MQTT — F&B topics (filler traceability, environment, chiller, CIP)
# Broker: localhost:1883, anonymous, no TLS
# PRD: Appendix C, Section 3.3 (F&B topics)
# ==========================================================================

  - type: mqtt_consumer
    alias: fnb_mqtt
    servers:
      - tcp://localhost:1883
    topics:
      - collatr/factory/demo/foodbev1/filler/#
      - collatr/factory/demo/foodbev1/env/#
      - collatr/factory/demo/foodbev1/chiller/#
      - collatr/factory/demo/foodbev1/cip/#
    qos: 1
    data_format: json
    topic_tag: topic
    tags:
      protocol: mqtt
    reconnect:
      initial_delay: 2s
      max_delay: 30s

# ==========================================================================
# Outputs
# ==========================================================================

outputs:
  - type: local_store
    path: ./data/factory-sim-foodbev
    retention_days: 7
    rotation: daily

  - type: file
    alias: verification_log
    path: ./data/factory-sim-foodbev/metrics.jsonl
    data_format: json
